name: API Gateway Tests

on:
  push:
    paths:
      - 'apps/api-gateway/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/api-gateway-tests.yml'
  pull_request:
    paths:
      - 'apps/api-gateway/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/api-gateway-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run api-gateway tests
        run: pnpm --filter @tap/api-gateway test
